services:
  app:
    build:
      context: .
      target: base
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - 5173:5173
      # expose port 4983 to run `bunx drizzle-kit studio --host 0.0.0.0` 
      # and visit `https://local.drizzle.studio/`
      - 4983:4983
    # env_file: .env  # Vite auto-loads /app/.env from the bound volume (.:/app)
    command: sleep infinity

  db:
    image: postgres:18.1-bookworm
    restart: unless-stopped
    ports:
      - 5432:5432
    env_file: .env
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
